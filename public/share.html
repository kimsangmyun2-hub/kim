<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아파트관리 통합검색</title>
  <style>
    body { font-family: sans-serif; background:#f3f4f6; margin:0; }
    .wrap {
      max-width: 1280px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe3ea;
      border-radius: 24px;
      padding: 42px;
      box-shadow:
        0 10px 30px rgba(15, 23, 42, 0.06),
        0 2px 8px rgba(15, 23, 42, 0.04);
    }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .btn {
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-decoration:none;
      color:#111827;
      font-weight:700;
      border:1px solid #dbe3ea;
      border-radius:20px;
      padding:28px 30px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      min-height:120px;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      box-shadow: 0 4px 14px rgba(15,23,42,.05);
    }
    .btn:hover {
      transform: translateY(-4px);
      border-color: #94a3b8;
    
      box-shadow:
        0 16px 30px rgba(15,23,42,.10);
    }
    .btn-left { display:flex; align-items:center; gap:10px; }
    
    .app-title {
      font-size: 30px;
      font-weight: 900;
      display:block;
      margin-bottom:6px;
    }
    
    .app-sub {
      font-size: 18px;
      color:#64748b;
      font-weight:600;
    }
    .app-icon {
      width: 72px !important;
      height: 72px !important;
      flex: 0 0 72px !important;
      object-fit: contain !important;
    }
    .hero-title {
      display: flex;
      align-items: center;
      gap: 22px;
      margin: 0 0 14px;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
    }
    
    .hero-logo {
      width: 82px;
      height: 82px;
      object-fit: contain;
      flex: 0 0 82px;
    }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1 class="hero-title">
        <svg class="hero-logo" viewBox="0 0 96 96" aria-label="아파트관리 통합검색 로고">
          <rect x="8" y="8" width="80" height="80" rx="10"
                fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
      
          <path d="M24 38 L48 20 L72 38"
                fill="none"
                stroke="#0f766e"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"/>
      
          <rect x="29" y="40" width="17" height="30" rx="2" fill="#0f766e"/>
          <rect x="50" y="36" width="18" height="34" rx="2" fill="#111827"/>
      
          <rect x="34" y="47" width="4" height="4" fill="#ffffff"/>
          <rect x="34" y="57" width="4" height="4" fill="#ffffff"/>
      
          <rect x="55" y="44" width="4" height="4" fill="#ffffff"/>
          <rect x="62" y="44" width="4" height="4" fill="#ffffff"/>
          <rect x="55" y="55" width="4" height="4" fill="#ffffff"/>
      
          <path d="M14 80 L28 66"
                stroke="#2563eb"
                stroke-width="5"
                stroke-linecap="round"/>
      
          <path d="M15 67 H29 V81"
                fill="none"
                stroke="#2563eb"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"/>
      
          <circle cx="65" cy="62" r="13"
                  fill="none"
                  stroke="#c2410c"
                  stroke-width="5"/>
      
          <line x1="75" y1="72" x2="86" y2="83"
                stroke="#111827"
                stroke-width="5"
                stroke-linecap="round"/>
      
          <text x="33" y="83"
                font-size="14"
                font-weight="900"
                fill="#0f766e">APT</text>
        </svg>
      
        <span>아파트관리 통합검색</span>
      </h1>
      <p style="margin:0;color:#64748b;font-size:20px;font-weight:500;">
        원하는 서비스를 선택해 이동하세요.
      </p>

      <div class="grid">
        <a class="btn" href="https://kapt-search-app.onrender.com/kapt-share" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <svg class="app-icon" viewBox="0 0 64 64" aria-label="K-APT 아이콘">
      <rect x="0" y="0" width="64" height="64" rx="10" fill="#ffffff"/>
      <circle cx="27" cy="30" r="18" fill="#f8fafc" stroke="#0f766e" stroke-width="5"/>
      <circle cx="27" cy="30" r="10" fill="#c2410c"/>
      <circle cx="27" cy="30" r="6" fill="#1f2937"/>
      <circle cx="29" cy="27" r="2.2" fill="#ffffff"/>
      <line x1="40" y1="43" x2="55" y2="58" stroke="#c2410c" stroke-width="6" stroke-linecap="round"/>
      <rect x="9" y="8" width="34" height="8" rx="2" fill="#111827"/>
    </svg>
    <span class="app-text">
      <span class="app-title">K-APT</span>
      <span class="app-sub">입찰검색 · 낙찰분석 앱</span>
    </span>
  </span>
  <span class="arrow">↗</span>
</a>

<a class="btn" href="https://panapp.duckdns.org" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <img src="/assets/case-logo.jpg" alt="판례앱 아이콘" class="app-icon" />
    <span class="app-text">
      <span class="app-title">판례앱</span>
      <span class="app-sub">공동주택 법률 · 판례 검색</span>
    </span>
  </span>
  <span class="arrow">↗</span>
</a>
      </div>
    </section>
  </main>
</body>
</html>
