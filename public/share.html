<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아파트관리 통합검색</title>
  <style>
    body { font-family: sans-serif; background:#f3f4f6; margin:0; }
    .wrap { max-width:900px; margin:40px auto; padding:0 16px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .btn {
      display:flex; justify-content:space-between; align-items:center;
      text-decoration:none; color:#111827; font-weight:700;
      border:1px solid #e5e7eb; border-radius:10px; padding:14px 16px; background:#f8fafc;
    }
    .btn-left { display:flex; align-items:center; gap:10px; }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1 style="margin:0 0 8px;">아파트관리 통합검색</h1>
      <p style="margin:0;color:#6b7280;">원하는 서비스를 선택해 이동하세요.</p>

      <div class="grid">
        <a class="btn" href="https://kapt-search-app.onrender.com/kapt-share" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <!-- K-APT: 탐정+큰 눈동자+돋보기 아이콘 -->
    <svg width="30" height="30" viewBox="0 0 64 64" aria-label="K-APT 아이콘">
      <circle cx="28" cy="30" r="19" fill="#f8fafc" stroke="#0f766e" stroke-width="6"/>
      <circle cx="28" cy="30" r="11" fill="#b91c1c"/>
      <circle cx="28" cy="30" r="7" fill="#1f2937"/>
      <circle cx="30" cy="27" r="2.5" fill="#ffffff"/>
      <line x1="42" y1="44" x2="58" y2="60" stroke="#b91c1c" stroke-width="7" stroke-linecap="round"/>
      <rect x="10" y="6" width="36" height="10" rx="2" fill="#111827"/>
    </svg>
    <span>K-APT</span>
  </span>
  <span>↗</span>
</a>

<a class="btn" href="https://panapp.duckdns.org" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <!-- 판례앱: 기존 아이콘 이미지 사용 -->
    <img src="/images/precedent-logo.png" alt="판례앱 아이콘" width="30" height="30" style="border-radius:6px; object-fit:cover;" />
    <span>판례앱</span>
  </span>
  <span>↗</span>
</a>
      </div>
    </section>
  </main>
</body>
</html>
