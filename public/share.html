<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아파트관리 통합검색</title>
  <style>
    body { font-family: sans-serif; background:#f3f4f6; margin:0; }
    .wrap { max-width:900px; margin:40px auto; padding:0 16px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .btn {
      display:flex; justify-content:space-between; align-items:center;
      text-decoration:none; color:#111827; font-weight:700;
      border:1px solid #e5e7eb; border-radius:10px; padding:14px 16px; background:#f8fafc;
    }
    .btn-left { display:flex; align-items:center; gap:10px; }

    .app-icon {
      width: 48px !important;
      height: 48px !important;
      flex: 0 0 48px !important;
      object-fit: contain !important;
    }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1 style="margin:0 0 8px;">아파트관리 통합검색</h1>
      <p style="margin:0;color:#6b7280;">원하는 서비스를 선택해 이동하세요.</p>

      <div class="grid">
        <a class="btn" href="https://kapt-search-app.onrender.com/kapt-share" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <svg class="app-icon" viewBox="0 0 64 64" aria-label="K-APT 아이콘">
      <rect x="0" y="0" width="64" height="64" rx="10" fill="#ffffff"/>
      <circle cx="27" cy="30" r="18" fill="#f8fafc" stroke="#0f766e" stroke-width="5"/>
      <circle cx="27" cy="30" r="10" fill="#c2410c"/>
      <circle cx="27" cy="30" r="6" fill="#1f2937"/>
      <circle cx="29" cy="27" r="2.2" fill="#ffffff"/>
      <line x1="40" y1="43" x2="55" y2="58" stroke="#c2410c" stroke-width="6" stroke-linecap="round"/>
      <rect x="9" y="8" width="34" height="8" rx="2" fill="#111827"/>
    </svg>
    <span class="app-text">
      <span class="app-title">K-APT</span>
      <span class="app-sub">입찰검색 · 낙찰분석 앱</span>
    </span>
  </span>
  <span class="arrow">↗</span>
</a>

<a class="btn" href="https://panapp.duckdns.org" target="_blank" rel="noreferrer">
  <span class="btn-left">
    <img src="/assets/case-logo.jpg" alt="판례앱 아이콘" class="app-icon" />
    <span class="app-text">
      <span class="app-title">판례앱</span>
      <span class="app-sub">공동주택 법률 · 판례 검색</span>
    </span>
  </span>
  <span class="arrow">↗</span>
</a>
      </div>
    </section>
  </main>
</body>
</html>
