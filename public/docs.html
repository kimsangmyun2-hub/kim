<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DOCS 문서질답</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif; background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%); color: #0f172a; }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 56px; }
    .top { display:flex; justify-content:space-between; align-items:flex-start; gap:18px; margin-bottom:22px; }
    .brand { display:flex; align-items:center; gap:18px; }
    .logo { width: 74px; height: 74px; border-radius: 20px; display:grid; place-items:center; background:#0f766e; color:#fff; box-shadow:0 14px 30px rgba(15,118,110,.18); font-weight:900; font-size:24px; }
    h1 { margin:0 0 8px; font-size:38px; letter-spacing:-1px; }
    .sub { margin:0; color:#64748b; font-size:17px; font-weight:700; line-height:1.6; }
    .back { text-decoration:none; color:#0f766e; font-weight:900; border:1px solid #cbd5e1; background:#fff; padding:10px 14px; border-radius:999px; }
    .panel { background:#fff; border:1px solid #dbe3ea; border-radius:24px; padding:28px; box-shadow:0 16px 36px rgba(15,23,42,.07); }
    .question-box { display:grid; grid-template-columns: 180px 1fr 110px; gap:12px; align-items:center; }
    select, input, button { height:48px; border-radius:12px; border:1px solid #cbd5e1; font:inherit; }
    select, input { padding:0 14px; background:#fff; }
    button { border:0; background:#0f766e; color:#fff; font-weight:900; cursor:pointer; }
    .examples { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
    .chip { border:1px solid #dbe3ea; background:#f8fafc; color:#334155; padding:8px 11px; border-radius:999px; font-size:13px; font-weight:800; cursor:pointer; }
    .result { margin-top:18px; display:grid; gap:14px; }
    .answer { border:1px solid #dbe3ea; border-radius:18px; padding:20px; background:#f8fafc; line-height:1.75; }
    .answer h2 { margin:0 0 10px; font-size:20px; }
    .answer ul { margin:8px 0 0; padding-left:22px; }
    .refs { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    .ref-card { border:1px solid #dbe3ea; border-radius:18px; background:#fff; padding:18px; }
    .ref-card h3 { margin:0 0 8px; font-size:17px; }
    .ref-card p { margin:0 0 12px; color:#64748b; line-height:1.6; }
    .ref-card a { display:inline-flex; text-decoration:none; background:#0f766e; color:#fff; font-weight:900; padding:9px 12px; border-radius:999px; }
    .notice { margin-top:16px; color:#64748b; font-size:13px; line-height:1.7; }
    .case-list { display:grid; gap:10px; margin-top:10px; }
    .case-item { border:1px solid #e2e8f0; background:#f8fafc; border-radius:14px; padding:13px; }
    .case-no { font-weight:900; color:#0f766e; margin-bottom:5px; }
    .case-title { font-weight:900; margin-bottom:5px; }
    .case-summary { color:#475569; line-height:1.6; }
    .case-state { color:#64748b; font-size:13px; line-height:1.6; }
    mark { background:#d9f99d; padding:0 3px; border-radius:4px; }
    @media (max-width: 820px) { .top, .refs { display:grid; } .question-box { grid-template-columns:1fr; } h1 { font-size:30px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brand">
        <div class="logo">DOCS</div>
        <div>
          <h1>문서질답앱</h1>
          <p class="sub">관리비 · 법률 · 하자 문서를 기반으로 답변하고, 관련 판례는 기존 판례앱에서 사건번호와 핵심내용을 불러옵니다.</p>
        </div>
      </div>
      <a class="back" href="/">통합메인으로</a>
    </section>

    <section class="panel">
      <div class="question-box">
        <select id="category">
          <option value="all">전체 문서</option>
          <option value="관리비">관리비</option>
          <option value="법률">법률</option>
          <option value="하자">하자</option>
        </select>
        <input id="question" type="text" placeholder="예: 장기수선충당금으로 CCTV 교체 가능한가?" />
        <button id="askBtn" type="button">질문</button>
      </div>
      <div class="examples">
        <button class="chip" type="button">장기수선충당금 CCTV 교체</button>
        <button class="chip" type="button">하자보수 방수공사 책임</button>
        <button class="chip" type="button">입주자대표회의 의결 정족수</button>
        <button class="chip" type="button">관리비 소멸시효</button>
      </div>
      <p class="notice">※ 판례앱 API가 연결되면 사건번호와 핵심내용이 자동 표시됩니다. API 미연결 시 판례앱 열기 버튼으로 이동합니다.</p>
    </section>

    <section id="result" class="result"></section>
  </main>

  <script>
    const PANAPP_URL = "https://panapp.duckdns.org";
    const CASE_API_URL = `${PANAPP_URL}/api/cases/search`;
    const docs = [
      { category:"관리비", keywords:["장기수선", "장충", "CCTV", "승강기", "방수", "주차차단기"], title:"장기수선충당금 검토", answer:["장기수선계획에 포함된 주요시설의 전면교체·주요부품 교체는 장기수선충당금 사용 여부를 우선 검토합니다.", "공고 또는 공사 전에 장기수선계획 반영 여부, 입주자대표회의 의결, 공사 범위가 수선유지비인지 장충금 대상인지 구분해야 합니다.", "CCTV·승강기·방수·주차차단기 등은 공사 범위와 계획 반영 여부에 따라 판단이 달라질 수 있습니다."] },
      { category:"하자", keywords:["하자", "방수", "누수", "균열", "담보책임", "보수"], title:"하자보수 및 손해배상 검토", answer:["하자 사안은 발생 위치, 사용검사일, 하자담보책임기간, 보수 요청 및 통지 자료가 중요합니다.", "방수·누수·균열은 사진, 보수이력, 전문가 의견, 입주자 민원자료를 함께 정리하는 것이 좋습니다.", "분쟁 가능성이 있으면 하자보수 청구와 손해배상 청구 가능성을 구분해 검토해야 합니다."] },
      { category:"법률", keywords:["입주자대표회의", "의결", "정족수", "동별대표", "선관위", "해임"], title:"입주자대표회의·선거관리 법률 검토", answer:["의결 가능 여부는 관리규약, 공동주택관리법령, 정원과 현원, 안건의 성격을 함께 보아야 합니다.", "동별대표자 해임·보궐선거·선관위 의결은 절차 하자가 발생하기 쉬우므로 공고, 통지, 회의록, 투표자료를 보존해야 합니다.", "즉시 상정, 재심의, 정족수 문제는 사안별로 위법 여부가 달라질 수 있습니다."] },
      { category:"관리비", keywords:["관리비", "소멸시효", "연체", "징수", "잡수입", "잡손실"], title:"관리비·회계 처리 검토", answer:["관리비 채권은 청구 시점, 납부고지, 연체관리, 소멸시효 중단 여부를 확인해야 합니다.", "잡수입·잡손실 처리는 공동주택 회계처리기준과 관리규약상 예산 편성 여부를 함께 검토하는 것이 안전합니다.", "소송비용, 과태료, 손해배상 지출은 책임 주체와 회계 처리 항목을 분리해 검토해야 합니다."] }
    ];

    function escapeHtml(value) {
      return String(value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;");
    }

    function scoreDoc(doc, q, category) {
      if (category !== "all" && doc.category !== category) return 0;
      const text = q.toLowerCase();
      return doc.keywords.reduce((score, keyword) => score + (text.includes(keyword.toLowerCase()) ? 3 : 0), 0);
    }

    function buildPanappLink() {
      return PANAPP_URL;
    }

    async function fetchCases(q) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      try {
        const response = await fetch(`${CASE_API_URL}?q=${encodeURIComponent(q)}&limit=3`, { signal: controller.signal });
        if (!response.ok) throw new Error("case api failed");
        const data = await response.json();
        return Array.isArray(data.items) ? data.items : [];
      } catch {
        return null;
      } finally {
        clearTimeout(timer);
      }
    }

    function renderCases(cases, q) {
      if (cases === null) {
        return `
          <div class="case-state">
            판례앱 검색 API가 아직 연결되지 않았거나 CORS 허용이 필요합니다.<br>
            판례앱에 <code>/api/cases/search</code> 추가 후 자동으로 사건번호와 핵심내용이 표시됩니다.
          </div>
          <a href="${buildPanappLink(q)}" target="_blank" rel="noreferrer">판례앱 열기</a>
        `;
      }
      if (!cases.length) {
        return `
          <div class="case-state">질문과 직접 매칭되는 판례를 찾지 못했습니다.</div>
          <a href="${buildPanappLink(q)}" target="_blank" rel="noreferrer">판례앱에서 직접 검색</a>
        `;
      }
      return `
        <div class="case-list">
          ${cases.map((item) => `
            <div class="case-item">
              <div class="case-no">${escapeHtml(item.case_no || item.caseNo || item.case_number || "사건번호 미확인")}</div>
              <div class="case-title">${escapeHtml(item.title || item.case_name || item.name || "관련 판례")}</div>
              <div class="case-summary">${escapeHtml(item.summary || item.ai_summary || item.content_summary || item.short_summary || "핵심내용이 등록되지 않았습니다.")}</div>
            </div>
          `).join("")}
        </div>
        <a href="${buildPanappLink(q)}" target="_blank" rel="noreferrer">판례앱 자세히 보기</a>
      `;
    }

    async function ask() {
      const q = document.getElementById("question").value.trim();
      const category = document.getElementById("category").value;
      const result = document.getElementById("result");
      if (!q) {
        result.innerHTML = `<div class="answer"><h2>질문을 입력해주세요.</h2><p>예: 장기수선충당금으로 승강기 쉬브 교체가 가능한가?</p></div>`;
        return;
      }
      const ranked = docs.map(doc => ({ ...doc, score: scoreDoc(doc, q, category) })).filter(doc => doc.score > 0).sort((a,b) => b.score - a.score);
      const picked = ranked[0] || docs.find(doc => category === "all" || doc.category === category) || docs[0];
      const related = ranked.slice(0, 3).length ? ranked.slice(0, 3) : [picked];
      result.innerHTML = `<div class="answer"><h2>검색 중입니다.</h2><p>문서 답변과 관련 판례를 확인하고 있습니다.</p></div>`;
      const cases = await fetchCases(q);
      result.innerHTML = `
        <div class="answer">
          <h2>${escapeHtml(picked.title)}</h2>
          <p><strong>질문:</strong> ${escapeHtml(q)}</p>
          <ul>${picked.answer.map(line => `<li>${escapeHtml(line)}</li>`).join("")}</ul>
        </div>
        <div class="refs">
          <div class="ref-card">
            <h3>관련 판례 사건번호·핵심내용</h3>
            ${renderCases(cases, q)}
          </div>
          <div class="ref-card">
            <h3>관련 문서 후보</h3>
            <p>${related.map(doc => `${doc.category} · ${doc.title}`).join("<br>")}</p>
          </div>
        </div>
      `;
    }

    document.getElementById("askBtn").addEventListener("click", ask);
    document.getElementById("question").addEventListener("keydown", (event) => { if (event.key === "Enter") ask(); });
    document.querySelectorAll(".chip").forEach(button => {
      button.addEventListener("click", () => {
        document.getElementById("question").value = button.textContent;
        ask();
      });
    });
  </script>
</body>
</html>
